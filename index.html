<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Ecommerce Demo</title>
  <style>
    /*LAYOUT & CENTERING*/
    body { 
      font-family: system-ui, sans-serif; 
      background: #f4f4f4; 
      padding: 20px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 1200px;
    }

    h1 { 
      text-align: center; 
      color: #6a0dad; 
      margin-bottom: 30px; 
    }

    section {
      background: white;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      max-width: 700px;
      width: 100%;
      margin: 0 auto 40px auto;
    }

    /*INPUT DESIGN*/
    .box-input {
      position: relative;
      margin-bottom: 28px;
      max-width: 320px;
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    .border {
      background-image: linear-gradient(to right bottom, #e300ff, #ff00aa, #ff5956, #ffb900, #fffe00);
      box-shadow: -25px -10px 30px -5px rgba(225, 0, 255, 0.5),
                  25px -10px 30px -5px rgba(255, 0, 212, 0.5),
                  25px 10px 30px -5px rgba(255, 174, 0, 0.5),
                  -25px 10px 30px -5px rgba(255, 230, 0, 0.5);
      padding: 4px;
      border-radius: 12px;
    }

    .input {
      background-color: #212121;
      width: 100%;
      height: 48px;
      padding: 0 19px 0 14px;
      font-size: 1.05em;
      border: none;
      color: white;
      outline: 0;
      border-radius: 9px;
      box-sizing: border-box;
    }

    .box-input::after,
    .box-input::before {
      content: "";
      width: 140px;
      height: 35px;
      position: absolute;
      z-index: -1;
      border-radius: 12px;
    }

    .box-input::after { bottom: -6px; right: -6px; }
    .box-input::before { top: -6px; left: -6px; }

    .input::placeholder {
      color: #aaa;
      transition: all 0.5s ease-in, transform 0.2s ease-in 0.6s;
    }

    .input:focus::placeholder {
      padding-left: 180px;
      transform: translateY(-50px);
    }

    /*NEW ADVANCED BUTTON DESIGN*/
    .buttons {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .button {
      --width: 160px;
      --height: 45px;
      --tooltip-height: 35px;
      --tooltip-width: 120px;
      --gap-between-tooltip-to-button: 18px;
      --button-color: #222;
      --tooltip-color: #fff;
      
      width: var(--width);
      height: var(--height);
      background: var(--button-color);
      position: relative;
      text-align: center;
      border-radius: 0.45em;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.3s;
      cursor: pointer;
      border: none;
      color: white;
      overflow: hidden;
    }

    /* Save Button Color */
    .save-btn {
      --button-color: #1875FF;
      background: var(--button-color);
    }

    /* Clear Button Color */
    .clear-btn {
      --button-color: #ef4444;
      background: var(--button-color);
    }

    .button::before {
      position: absolute;
      content: attr(data-tooltip);
      width: var(--tooltip-width);
      height: var(--tooltip-height);
      background-color: #555;
      font-size: 0.85rem;
      color: #fff;
      border-radius: .25em;
      line-height: var(--tooltip-height);
      bottom: calc(var(--height) + var(--gap-between-tooltip-to-button) + 10px);
      left: calc(50% - var(--tooltip-width) / 2);
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s;
    }

    .button::after {
      position: absolute;
      content: '';
      width: 0;
      height: 0;
      border: 10px solid transparent;
      border-top-color: #555;
      left: calc(50% - 10px);
      bottom: calc(100% + var(--gap-between-tooltip-to-button) - 10px);
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s;
    }

    .text {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      top: 0;
    }

    .button-wrapper, .text, .icon {
      overflow: hidden;
      position: absolute;
      width: 100%;
      height: 100%;
      left: 0;
    }

    .text {
      top: 0;
      transition: top 0.5s;
    }

    .icon {
      color: #fff;
      top: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: top 0.5s;
    }

    .icon svg {
      width: 24px;
      height: 24px;
    }

    .button:hover {
      background: var(--button-color);
    }

    .button:hover .text {
      top: -100%;
    }

    .button:hover .icon {
      top: 0;
    }

    .button:hover:before,
    .button:hover:after {
      opacity: 1;
      visibility: visible;
    }

    .button:hover:after {
      bottom: calc(var(--height) + var(--gap-between-tooltip-to-button) - 20px);
    }

    .button:hover:before {
      bottom: calc(var(--height) + var(--gap-between-tooltip-to-button));
    }

    /*PRODUCT CARD*/
    .product-card {
      width: 190px;
      height: 254px;
      background: rgb(236, 236, 236);
      box-shadow: rgba(0, 0, 0, 0.4) 0px 2px 4px, 
                  rgba(0, 0, 0, 0.3) 0px 7px 13px -3px, 
                  rgba(0, 0, 0, 0.2) 0px -3px 0px inset;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-12px);
      box-shadow: rgba(0, 0, 0, 0.5) 0px 10px 20px;
    }

    .card-img {
      height: 145px;
      background: #ddd;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img-placeholder {
      font-size: 55px;
      background: linear-gradient(135deg, #ff9f6e, #ffcaa6);
      color: white;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-info {
      padding: 10px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .text-title { font-weight: 900; font-size: 1.05rem; margin: 0 0 5px 0; line-height: 1.3; }
    .text-body { font-size: 0.82rem; color: #555; margin-bottom: 8px; flex-grow: 1; }
    .price { font-size: 1.2rem; font-weight: bold; color: #6a0dad; }

    .card-footer {
      padding: 0 12px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }

    .stock { color: #666; }

    .products-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      justify-content: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>
  </div>

  <h1>Product Manager</h1>

  <section>
    <h2 style="text-align: center;">Add / Update Product</h2>

    <input type="hidden" id="productId" />

    <div class="box-input">
      <div class="border">
        <input type="text" id="name" class="input" placeholder="Product Name" />
      </div>
    </div>

    <div class="box-input">
      <div class="border">
        <input type="text" id="description" class="input" placeholder="Short description" />
      </div>
    </div>

    <div class="box-input">
      <div class="border">
        <select id="category" class="input">
          <option value="">Select Category</option>
          <option value="Clothing">Clothing</option>
          <option value="Electronics">Electronics</option>
          <option value="Accessories">Accessories</option>
          <option value="Home">Home & Living</option>
        </select>
      </div>
    </div>

    <div class="box-input">
      <div class="border">
        <input type="number" id="price" class="input" placeholder="Price in PHP" />
      </div>
    </div>

    <div class="box-input">
      <div class="border">
        <input type="number" id="stock" class="input" placeholder="Stock Quantity" />
      </div>
    </div>

    <!-- New Advanced Buttons -->
    <div class="buttons">
      <button onclick="saveProduct()" class="button save-btn" data-tooltip="Save to Database">
        <div class="text">Save Product</div>
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        </div>
      </button>

      <button onclick="clearForm()" class="button clear-btn" data-tooltip="Reset Form">
        <div class="text">Clear Form</div>
        <div class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6h12v12" />
          </svg>
        </div>
      </button>
    </div>
  </section>

  <hr style="max-width: 700px; width: 100%; margin: 30px auto;">

  <section>
    <h2 style="text-align: center;">Products</h2>
    <div id="productList" class="products-grid"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>

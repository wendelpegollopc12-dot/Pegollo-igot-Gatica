<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Ecommerce Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Product Manager</h1>

  <section>
    <h2>Add / Update Product</h2>

    <input type="hidden" id="productId" />

    <label>
      Product Name
      <input type="text" id="name" placeholder="Example: T-Shirt" />
    </label>

    <label>
      Description
      <input type="text" id="description" placeholder="Short product description" />
    </label>

    <label>
      Price in PHP
      <input type="number" id="price" placeholder="Example: 250" />
    </label>

    <label>
      Stock
      <input type="number" id="stock" placeholder="Example: 10" />
    </label>

    <button onclick="saveProduct()">Save Product</button>
    <button onclick="clearForm()">Clear</button>
  </section>

  <hr />

  <section>
    <h2>Products</h2>
    <div id="productList"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
